name: Deploy Landing Page & Build Extension

on:
  push:
    branches:
      - main
      - master

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: './package-lock.json'

      # 1. Install & Build Extension (Root)
      - name: Install Extension Dependencies
        run: npm ci

      - name: Build Extension
        run: npm run build

      - name: Zip Extension Build
        run: |
          cd dist
          zip -r ../dc-risk-extension.zip .
          cd ..

      # 2. Install & Build Landing Page
      - name: Install Landing Page Dependencies
        run: |
          cd landing
          npm ci
          cd ..

      - name: Build Landing Page
        run: |
          cd landing
          npm run build
          cd ..

      # 3. Deploy Landing Page to GitHub Pages
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./landing/dist
          force_orphan: true

      # 4. Upload Extension ZIP as Build Artifact
      - name: Upload Extension ZIP
        uses: actions/upload-artifact@v4
        with:
          name: dc-risk-extension
          path: dc-risk-extension.zip
